openapi: 3.0.3
info:
  title: FitFlow API
  description: |
    FitFlow is a comprehensive fitness and nutrition tracking platform.
    
    ## Authentication
    Most endpoints require a Bearer JWT token in the `Authorization` header.
    Obtain a token via `/api/auth/signup` or `/api/auth/login`.
    
    ## Tiers
    Some features are restricted by subscription tier:
    - **Free** – basic tracking
    - **Pro** – favorites, advanced insights
    - **Elite** – full AI coaching, unlimited access
  version: 1.0.0
  contact:
    name: FitFlow Support

servers:
  - url: https://fitflow-theta.vercel.app
    description: Production

tags:
  - name: Health
    description: Health check
  - name: Tiers
    description: Subscription plans
  - name: Auth
    description: Authentication and account management
  - name: PayPal
    description: PayPal payment processing
  - name: Food
    description: Food search, logging, and favorites
  - name: Meals
    description: AI meal plan generation
  - name: Coach
    description: AI fitness coach
  - name: Chat
    description: Chat history persistence
  - name: Habits
    description: Daily habit tracking
  - name: Lessons
    description: Educational fitness lessons
  - name: Workouts
    description: Workout playlists and search
  - name: Videos
    description: Video content browsing
  - name: Weight
    description: Weight logging
  - name: Water
    description: Water intake tracking
  - name: ProgressPhotos
    description: Progress photo uploads
  - name: Steps
    description: Step counting
  - name: Progress
    description: Streaks and weekly summaries

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from signup or login.

  schemas:
    # ── Core models ──────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: Jane Doe
        tier:
          type: string
          enum: [free, pro, elite]
          example: free
        onboarded:
          type: boolean
          example: false
        calorieGoal:
          type: integer
          example: 2000
        emailVerified:
          type: boolean
          example: false

    UserFull:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            goalType:
              type: string
              example: lose
            activityLevel:
              type: string
              example: moderate
            createdAt:
              type: string
              format: date-time

    Plan:
      type: object
      properties:
        id:
          type: string
          example: pro
        name:
          type: string
          example: Pro
        price:
          type: number
          format: float
          example: 9.99
        period:
          type: string
          example: month
        features:
          type: array
          items:
            type: string
          example:
            - Unlimited food logging
            - Favorite meals
            - Advanced insights

    FoodSearchResult:
      type: object
      properties:
        name:
          type: string
          example: Grilled Chicken Breast
        category:
          type: string
          example: Protein
        serving:
          type: string
          example: 100g
        calories:
          type: number
          example: 165
        protein:
          type: number
          example: 31
        carbs:
          type: number
          example: 0
        fat:
          type: number
          example: 3.6
        fiber:
          type: number
          example: 0
        sugar:
          type: number
          example: 0
        color:
          type: string
          example: "#4CAF50"
        source:
          type: string
          example: usda

    BarcodeResult:
      type: object
      properties:
        name:
          type: string
          example: Kirkland Organic Peanut Butter
        calories:
          type: number
          example: 190
        protein:
          type: number
          example: 7
        carbs:
          type: number
          example: 7
        fat:
          type: number
          example: 16
        serving:
          type: string
          example: 2 tbsp (32g)
        source:
          type: string
          example: openfoodfacts
        barcode:
          type: string
          example: "096619000000"

    FoodLog:
      type: object
      properties:
        id:
          type: integer
          example: 42
        userId:
          type: integer
          example: 1
        meal:
          type: string
          example: Grilled Chicken Salad
        calories:
          type: number
          example: 420
        protein:
          type: number
          example: 35
        carbs:
          type: number
          example: 20
        fat:
          type: number
          example: 18
        imageUrl:
          type: string
          nullable: true
          example: /uploads/food-123.jpg
        createdAt:
          type: string
          format: date-time

    FavoriteMeal:
      type: object
      properties:
        id:
          type: integer
          example: 7
        userId:
          type: integer
          example: 1
        meal:
          type: string
          example: Greek Yogurt Bowl
        calories:
          type: number
          example: 250
        protein:
          type: number
          example: 20
        carbs:
          type: number
          example: 30
        fat:
          type: number
          example: 5
        createdAt:
          type: string
          format: date-time

    MealSuggestionComponent:
      type: object
      properties:
        item:
          type: string
          example: chicken breast
        amount:
          type: string
          example: 150g
        calories:
          type: number
          example: 248

    MealSuggestion:
      type: object
      properties:
        name:
          type: string
          example: Grilled Chicken & Rice
        totalCalories:
          type: number
          example: 520
        protein:
          type: number
          example: 42
        carbs:
          type: number
          example: 55
        fat:
          type: number
          example: 12
        components:
          type: array
          items:
            $ref: '#/components/schemas/MealSuggestionComponent'

    MealPlanEntry:
      type: object
      properties:
        name:
          type: string
          example: Overnight Oats
        emoji:
          type: string
          example: "\U0001F963"
        calories:
          type: number
          example: 380
        protein:
          type: number
          example: 18
        carbs:
          type: number
          example: 52
        fat:
          type: number
          example: 10
        time:
          type: string
          example: "7:30 AM"
        ingredients:
          type: array
          items:
            type: string
          example: ["1/2 cup oats", "1 cup almond milk", "1 tbsp chia seeds"]
        steps:
          type: array
          items:
            type: string
          example: ["Mix oats with milk", "Refrigerate overnight", "Top with fruit"]

    CoachResponse:
      type: object
      properties:
        userId:
          type: integer
          example: 1
        query:
          type: string
          example: How much protein should I eat?
        answer:
          type: string
          example: Based on your activity level, aim for 1.6-2.2 g/kg of body weight.
        timestamp:
          type: string
          format: date-time

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
          example: user
        text:
          type: string
          example: What should I eat before a workout?

    Habit:
      type: object
      properties:
        id:
          type: integer
          example: 3
        userId:
          type: integer
          example: 1
        title:
          type: string
          example: Drink 8 glasses of water
        completed:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time

    Lesson:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Understanding Macronutrients
        description:
          type: string
          example: Learn the role of protein, carbs, and fats in your diet.
        content:
          type: string
        category:
          type: string
          example: Nutrition

    Workout:
      type: object
      properties:
        id:
          type: string
          example: yt_abc123
        title:
          type: string
          example: 15 Min Full Body HIIT
        thumbnail:
          type: string
          format: uri
        duration:
          type: string
          example: "15:00"
        channel:
          type: string
          example: FitnessBlender
        url:
          type: string
          format: uri

    VideoTab:
      type: object
      properties:
        id:
          type: string
          example: strength
        label:
          type: string
          example: Strength
        query:
          type: string

    WeightLog:
      type: object
      properties:
        id:
          type: integer
          example: 12
        userId:
          type: integer
          example: 1
        weight:
          type: number
          format: float
          example: 72.5
        unit:
          type: string
          enum: [kg, lbs]
          example: kg
        createdAt:
          type: string
          format: date-time

    WaterLog:
      type: object
      properties:
        id:
          type: integer
          example: 5
        userId:
          type: integer
          example: 1
        glasses:
          type: integer
          example: 6
        goal:
          type: integer
          example: 8
        date:
          type: string
          format: date
          example: "2026-03-26"

    ProgressPhoto:
      type: object
      properties:
        id:
          type: integer
          example: 4
        userId:
          type: integer
          example: 1
        imageUrl:
          type: string
          example: /uploads/progress-abc.jpg
        createdAt:
          type: string
          format: date-time

    StepLog:
      type: object
      properties:
        id:
          type: integer
          example: 9
        userId:
          type: integer
          example: 1
        steps:
          type: integer
          example: 8432
        date:
          type: string
          format: date
          example: "2026-03-26"

    StreaksResponse:
      type: object
      properties:
        currentStreak:
          type: integer
          example: 7
        longestStreak:
          type: integer
          example: 21

    WeeklySummary:
      type: object
      properties:
        totalCals:
          type: number
          example: 14200
        avgCals:
          type: number
          example: 2028
        totalProtein:
          type: number
          example: 840
        totalCarbs:
          type: number
          example: 1750
        totalFat:
          type: number
          example: 560
        daysLogged:
          type: integer
          example: 7
        mealsLogged:
          type: integer
          example: 19
        weightChange:
          type: number
          format: float
          example: -0.5
        currentWeight:
          type: number
          format: float
          nullable: true
          example: 72.5
        habitsCompleted:
          type: integer
          example: 12
        totalSteps:
          type: integer
          example: 56000
        avgSteps:
          type: integer
          example: 8000
        waterGoalDays:
          type: integer
          example: 5
        avgWater:
          type: number
          example: 6.8
        calorieByDay:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              calories:
                type: number

    # ── Error schemas ────────────────────────────────────────
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: Something went wrong

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Missing required field: email"
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Not authenticated
    Forbidden:
      description: Insufficient tier or permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Upgrade to Pro to use this feature
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Not found
    Conflict:
      description: Resource conflict (e.g. duplicate email)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Email already registered
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Rate limit exceeded
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Internal server error

# ═══════════════════════════════════════════════════════════════
# Paths
# ═══════════════════════════════════════════════════════════════
paths:
  # ── Health ─────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ── Tiers ──────────────────────────────────────────────────
  /api/tiers:
    get:
      tags: [Tiers]
      summary: List subscription plans
      operationId: getTiers
      responses:
        "200":
          description: Available plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plan'

  # ── Auth ───────────────────────────────────────────────────
  /api/auth/signup:
    post:
      tags: [Auth]
      summary: Create a new account
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: s3cureP@ss
                name:
                  type: string
                  example: Jane Doe
                tier:
                  type: string
                  enum: [free, pro, elite]
                  default: free
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  needsVerification:
                    type: boolean
                    example: true
        "400":
          $ref: '#/components/responses/BadRequest'
        "409":
          $ref: '#/components/responses/Conflict'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: s3cureP@ss
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/auth/verify:
    get:
      tags: [Auth]
      summary: Verify email address
      operationId: verifyEmail
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Email verification token
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Email verified successfully
        "400":
          $ref: '#/components/responses/BadRequest'

  /api/auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend verification email
      operationId: resendVerification
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Verification email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Verification email sent
        "401":
          $ref: '#/components/responses/Unauthorized'
        "429":
          $ref: '#/components/responses/RateLimited'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFull'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/auth/upgrade:
    put:
      tags: [Auth]
      summary: Upgrade subscription tier
      operationId: upgradeTier
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tier]
              properties:
                tier:
                  type: string
                  enum: [pro, elite]
                  example: pro
      responses:
        "200":
          description: Upgraded (or PayPal checkout initiated)
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      token:
                        type: string
                      user:
                        $ref: '#/components/schemas/User'
                  - type: object
                    properties:
                      checkoutUrl:
                        type: string
                        format: uri
                      paypalOrderId:
                        type: string
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/auth/onboard:
    post:
      tags: [Auth]
      summary: Complete onboarding
      operationId: onboard
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Jane Doe
                goalType:
                  type: string
                  enum: [lose, maintain, gain]
                  example: lose
                activityLevel:
                  type: string
                  enum: [sedentary, light, moderate, active, very_active]
                  example: moderate
                calorieGoal:
                  type: integer
                  example: 2000
      responses:
        "200":
          description: Onboarding complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/auth/profile:
    put:
      tags: [Auth]
      summary: Update user profile
      operationId: updateProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                goalType:
                  type: string
                  enum: [lose, maintain, gain]
                activityLevel:
                  type: string
                  enum: [sedentary, light, moderate, active, very_active]
                calorieGoal:
                  type: integer
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "409":
          $ref: '#/components/responses/Conflict'

  /api/auth/password:
    put:
      tags: [Auth]
      summary: Change password
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                  minLength: 6
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password updated
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/auth/account:
    delete:
      tags: [Auth]
      summary: Delete account
      operationId: deleteAccount
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Account deleted
        "401":
          $ref: '#/components/responses/Unauthorized'

  # ── PayPal ─────────────────────────────────────────────────
  /api/paypal/capture:
    post:
      tags: [PayPal]
      summary: Capture a PayPal order after approval
      operationId: capturePaypal
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId]
              properties:
                orderId:
                  type: string
                  example: 5O190127TN364715T
      responses:
        "200":
          description: Payment captured and tier upgraded
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  # ── Food search ────────────────────────────────────────────
  /api/food/search:
    get:
      tags: [Food]
      summary: Search foods by name, category, or source
      operationId: searchFood
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search query
          example: chicken
        - name: category
          in: query
          schema:
            type: string
          description: Filter by food category
          example: Protein
        - name: source
          in: query
          schema:
            type: string
            enum: [local, usda, openfoodfacts]
          description: Data source filter
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/FoodSearchResult'
                  categories:
                    type: array
                    items:
                      type: string
                    example: [Protein, Grains, Vegetables, Fruits, Dairy, Snacks]

  /api/food/categories:
    get:
      tags: [Food]
      summary: List food categories
      operationId: getFoodCategories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      type: string
                    example: [Protein, Grains, Vegetables, Fruits, Dairy, Snacks]

  /api/food/barcode/{code}:
    get:
      tags: [Food]
      summary: Look up food by barcode
      operationId: getBarcode
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: "096619000000"
      responses:
        "200":
          description: Barcode result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarcodeResult'
        "404":
          $ref: '#/components/responses/NotFound'

  # ── Food logs ──────────────────────────────────────────────
  /api/food/logs:
    post:
      tags: [Food]
      summary: Log a food entry
      operationId: createFoodLog
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [meal, calories]
              properties:
                meal:
                  type: string
                  example: Grilled Chicken Salad
                calories:
                  type: number
                  example: 420
                protein:
                  type: number
                  example: 35
                carbs:
                  type: number
                  example: 20
                fat:
                  type: number
                  example: 18
                imageUrl:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Food logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoodLog'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [Food]
      summary: Get today's food logs
